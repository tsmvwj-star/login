<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsg 管理面板 - 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <div class="theme-toggle">
        <button class="theme-toggle-btn" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- 登录容器 -->
    <div class="login-container">
        <div class="login-card">
            <!-- 登录头部 -->
            <div class="login-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-Tsg"></i>
                    </div>
                    <span class="logo-text">Tsg</span>
                </div>
                <h1 class="login-title">欢迎回来</h1>
                <p class="login-subtitle">请输入您的账号信息以登录管理面板</p>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm">
                <!-- 账号输入 -->
                <div class="form-group">
                    <label class="form-label">
                        账号
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            class="form-input" 
                            id="username" 
                            placeholder="请输入账号" 
                            autocomplete="username"
                            required
                        >
                    </div>
                    <div class="error-message" id="usernameError">请输入有效的账号</div>
                </div>

                <!-- 密码输入 -->
                <div class="form-group">
                    <label class="form-label">
                        密码
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            class="form-input" 
                            id="password" 
                            placeholder="请输入密码" 
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="passwordStrength"></div>
                        </div>
                        <div class="strength-text" id="passwordStrengthText">密码强度：无</div>
                    </div>
                    <div class="error-message" id="passwordError">请输入有效的密码</div>
                </div>

                <!-- 安全密码输入 -->
                <div class="form-group">
                    <label class="form-label">
                        安全密码（6位数字）
                        <span class="required">*</span>
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt input-icon"></i>
                        <input 
                            type="password" 
                            class="form-input" 
                            id="securityCode" 
                            placeholder="请输入6位安全密码" 
                            maxlength="6"
                            autocomplete="off"
                            required
                        >
                        <button type="button" class="toggle-password" id="toggleSecurityCode">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="securityCodeError">请输入6位数字安全密码</div>
                </div>

                <!-- 表单选项 -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        记住我
                    </label>
                    <a href="#" class="forgot-password" id="forgotPassword">忘记密码？</a>
                </div>

                <!-- 登录按钮 -->
                <button type="submit" class="login-button" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i>
                    登录系统
                </button>
            </form>

            <!-- 登录页脚 -->
            <div class="login-footer">
                <p>© 2026 Tsg 管理系统 | 版本 3.0.0</p>
                <div class="footer-links">
                    <a href="#" id="privacyLink">隐私政策</a>
                    <a href="#" id="termsLink">使用条款</a>
                    <a href="#" id="supportLink">技术支持</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM元素
        const themeToggle = document.getElementById('themeToggle');
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const securityCodeInput = document.getElementById('securityCode');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const toggleSecurityCodeBtn = document.getElementById('toggleSecurityCode');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const loginButton = document.getElementById('loginButton');
        const passwordStrength = document.getElementById('passwordStrength');
        const passwordStrengthText = document.getElementById('passwordStrengthText');

        // 错误信息元素
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const securityCodeError = document.getElementById('securityCodeError');

        // 链接元素
        const forgotPasswordLink = document.getElementById('forgotPassword');
        const privacyLink = document.getElementById('privacyLink');
        const termsLink = document.getElementById('termsLink');
        const supportLink = document.getElementById('supportLink');

        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('Tsg-theme') || 'light';
            setTheme(savedTheme);
        }

        // 设置主题
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = themeToggle.querySelector('i');
            
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
                localStorage.setItem('Tsg-theme', 'dark');
            } else {
                icon.className = 'fas fa-moon';
                localStorage.setItem('Tsg-theme', 'light');
            }
        }

        // 切换主题
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            setTheme(newTheme);
        }

        // 显示/隐藏密码
        function togglePasswordVisibility(inputId, toggleBtn) {
            const input = document.getElementById(inputId);
            const icon = toggleBtn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // 检查密码强度
        function checkPasswordStrength(password) {
            let strength = 0;
            let text = '弱';
            
            // 长度检查
            if (password.length >= 8) strength++;
            
            // 包含小写字母
            if (/[a-z]/.test(password)) strength++;
            
            // 包含大写字母
            if (/[A-Z]/.test(password)) strength++;
            
            // 包含数字
            if (/[0-9]/.test(password)) strength++;
            
            // 包含特殊字符
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            // 更新显示
            passwordStrength.className = 'strength-fill';
            
            if (strength <= 2) {
                passwordStrength.classList.add('weak');
                text = '弱';
            } else if (strength <= 4) {
                passwordStrength.classList.add('medium');
                text = '中';
            } else {
                passwordStrength.classList.add('strong');
                text = '强';
            }
            
            passwordStrengthText.textContent = `密码强度：${text}`;
        }

        // 验证表单
        function validateForm() {
            let isValid = true;
            
            // 验证用户名
            if (!usernameInput.value.trim()) {
                usernameError.classList.add('show');
                usernameInput.classList.add('error');
                isValid = false;
            } else {
                usernameError.classList.remove('show');
                usernameInput.classList.remove('error');
            }
            
            // 验证密码
            if (!passwordInput.value.trim() || passwordInput.value.length < 6) {
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                isValid = false;
            } else {
                passwordError.classList.remove('show');
                passwordInput.classList.remove('error');
            }
            
            // 验证安全密码
            const securityCode = securityCodeInput.value.trim();
            if (!securityCode || securityCode.length !== 6 || !/^\d+$/.test(securityCode)) {
                securityCodeError.classList.add('show');
                securityCodeInput.classList.add('error');
                isValid = false;
            } else {
                securityCodeError.classList.remove('show');
                securityCodeInput.classList.remove('error');
            }
            
            return isValid;
        }

        // 模拟登录
        function simulateLogin() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    // 模拟成功登录
                    resolve(true);
                }, 1500);
            });
        }

        // 处理表单提交
        async function handleSubmit(event) {
            event.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            // 显示加载状态
            loginButton.classList.add('loading');
            loginButton.disabled = true;
            loginButton.innerHTML = '<i class="fas fa-spinner"></i> 登录中...';
            
            try {
                // 模拟登录请求
                const success = await simulateLogin();
                
                if (success) {
                    // 保存记住我选项
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        localStorage.removeItem('rememberMe');
                    }
                    
                    // 显示成功消息
                   /// alert('登录成功！即将跳转到管理面板...');
                    
                    // 实际应用中这里会跳转到管理面板
                     window.location.href = 'https://tsmvwj-star.github.io/tsg/';
                }
            } catch (error) {
                alert('登录失败，请检查您的账号信息！');
            } finally {
                // 恢复按钮状态
                loginButton.classList.remove('loading');
                loginButton.disabled = false;
                loginButton.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录系统';
            }
        }

        // 事件监听器
        themeToggle.addEventListener('click', toggleTheme);
        togglePasswordBtn.addEventListener('click', () => togglePasswordVisibility('password', togglePasswordBtn));
        toggleSecurityCodeBtn.addEventListener('click', () => togglePasswordVisibility('securityCode', toggleSecurityCodeBtn));
        loginForm.addEventListener('submit', handleSubmit);

        // 密码强度实时检查
        passwordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });

        // 安全密码输入限制（仅数字）
        securityCodeInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length > 6) {
                this.value = this.value.slice(0, 6);
            }
        });

        // 链接点击事件
        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert('请通过技术支持渠道重置密码。');
        });

        privacyLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert('隐私政策页面');
        });

        termsLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert('使用条款页面');
        });

        supportLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert('技术支持：support@Tsg-system.com');
        });

        // 加载记住我选项
        function loadRememberMe() {
            if (localStorage.getItem('rememberMe') === 'true') {
                rememberMeCheckbox.checked = true;
                // 这里可以从安全存储中加载保存的用户名
                // 例如：usernameInput.value = localStorage.getItem('savedUsername') || '';
            }
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadRememberMe();
        });

        // 输入框实时验证
        usernameInput.addEventListener('input', function() {
            if (this.value.trim()) {
                this.classList.remove('error');
                usernameError.classList.remove('show');
            }
        });

        passwordInput.addEventListener('input', function() {
            if (this.value.trim() && this.value.length >= 6) {
                this.classList.remove('error');
                passwordError.classList.remove('show');
            }
        });

        securityCodeInput.addEventListener('input', function() {
            const value = this.value.trim();
            if (value.length === 6 && /^\d+$/.test(value)) {
                this.classList.remove('error');
                securityCodeError.classList.remove('show');
            }
        });
    </script>
</body>
</html>
